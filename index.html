<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />
  <title>SeshScore</title>

  <meta name="theme-color" content="#0f1117" />

  <link rel="manifest" href="./manifest.json">
  <link rel="apple-touch-icon" href="./static/image/seshscore_icon_512x512.png">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="./static/style.css?v=20260503-1">
</head>

<body>
  <!-- Splash -->
  <div class="splash-screen" id="splash" aria-hidden="true">
    <img src="./static/image/seshscore_icon_512x512.png" alt="SeshScore Logo" />
  </div>

  <!-- START -->
  <section class="screen active" id="start">
    <div class="app-header">
      <img src="./static/image/seshscore_icon_96x96.png" alt="SeshScore" class="app-logo" />
      <div>
        <h1 class="app-title">SeshScore</h1>
        <p class="app-subtitle">Mobile scoreboard</p>
      </div>
    </div>

    <div class="card">
      <button class="btn primary" data-nav="settings">New sesh</button>
      <button class="btn ghost" style="margin-top:10px" data-nav="game">Last sesh</button>
    </div>

    <p class="hint">Tip: add this as a PWA to your home screen for fullscreen game mode.</p>
  </section>

  <!-- SETTINGS -->
  <section class="screen" id="settings">
    <div class="topbar">
      <button class="icon-btn" data-nav="start" aria-label="Back">←</button>
      <div class="topbar-title">
        <h2>Players</h2>
        <p>Add players and set the order.</p>
      </div>
      <button class="icon-btn" data-nav="game" aria-label="Start game">▶</button>
    </div>

    <div class="card">
      <div class="row">
        <input type="text" id="playerName" placeholder="Player name" autocomplete="off" inputmode="text" />
        <button class="btn primary" id="btnAddPlayer">+</button>
      </div>

      <div class="row row-split">
        <button class="btn danger" id="btnDeleteAll">🗑 Remove all</button>
        <button class="btn ghost" data-nav="game">Start game ▶</button>
      </div>
    </div>

    <div class="section-title">
      <h3>Players</h3>
      <p>Use ↑/↓ to set the default order.</p>
    </div>

    <div id="players-settings" class="players"></div>
  </section>

  <!-- GAME -->
  <section class="screen" id="game">
    <div class="topbar">
      <button class="icon-btn" data-nav="start" aria-label="Back">←</button>
      <div class="topbar-title">
        <h2>SeshScore</h2>
        <p>Tap + / − to score</p>
      </div>
      <button class="icon-btn" data-nav="settings" aria-label="Settings">⚙</button>
    </div>

    <div class="step-row">
      <span class="step-label">Step</span>
      <div class="step-group" id="stepGroup">
        <button class="step-btn active" data-step="1">±1</button>
        <button class="step-btn" data-step="5">±5</button>
        <button class="step-btn" data-step="10">±10</button>
        <button class="step-btn" data-step="25">±25</button>
      </div>
    </div>

    <div id="players-game" class="players"></div>

    <!-- Sticky bottom bar -->
    <div class="bottom-bar">
      <label class="sr-only" for="sortOrder">Sort</label>
      <select id="sortOrder">
        <option value="custom">Order</option>
        <option value="desc">Highest first</option>
        <option value="asc">Lowest first</option>
      </select>
      <button class="btn ghost" id="btnUndo" aria-label="Undo" disabled>↩ Undo</button>
      <button class="btn danger" id="btnResetScores">Reset</button>
    </div>
  </section>

  <!-- Bottom Sheet: custom score -->
  <div class="sheet-backdrop hidden" id="sheetBackdrop" aria-hidden="true"></div>

  <div class="sheet hidden" id="scoreSheet" role="dialog" aria-modal="true" aria-labelledby="sheetTitle">
    <div class="sheet-handle" aria-hidden="true"></div>

    <div class="sheet-header">
      <div>
        <h3 id="sheetTitle">Adjust score</h3>
        <p id="sheetSubtitle" class="muted"></p>
      </div>
      <button class="icon-btn" id="btnCloseSheet" aria-label="Close">✕</button>
    </div>

    <div class="sheet-body">
      <div class="chip-row" id="chipRow">
        <button class="chip chip-neg" data-delta="-25">−25</button>
        <button class="chip chip-neg" data-delta="-10">−10</button>
        <button class="chip chip-neg" data-delta="-5">−5</button>
        <button class="chip chip-neg" data-delta="-2">−2</button>
        <button class="chip chip-neg" data-delta="-1">−1</button>
        <button class="chip chip-pos" data-delta="1">+1</button>
        <button class="chip chip-pos" data-delta="2">+2</button>
        <button class="chip chip-pos" data-delta="5">+5</button>
        <button class="chip chip-pos" data-delta="10">+10</button>
        <button class="chip chip-pos" data-delta="25">+25</button>
        <button class="chip chip-pos" data-delta="50">+50</button>
      </div>

      <div class="row">
        <button class="sign-btn" id="btnToggleSign" aria-label="Toggle sign">+</button>
        <input type="number" id="customDelta" placeholder="Value (e.g. 7)" inputmode="numeric" min="0" />
        <button class="btn primary" id="btnApplyDelta">Apply</button>
      </div>
    </div>
  </div>

  <script>
    // Service worker
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('./service-worker.js');
    }

    // Splash hide
    window.addEventListener('load', () => {
      setTimeout(() => document.getElementById('splash').style.display = 'none', 650);
    });

    // ── State ────────────────────────────────────────────────
    const SESSION_KEY = 'scoreboard_session_v2';
    let players = JSON.parse(localStorage.getItem(SESSION_KEY)) || [];

    players = players.map((p, i) => ({
      id: p.id ?? crypto?.randomUUID?.() ?? String(Date.now() + i),
      name: p.name,
      score: Number.isFinite(p.score) ? p.score : 0,
      order: Number.isFinite(p.order) ? p.order : i
    }));
    persist();

    let stepSize = 1;
    let undoStack = [];
    let activePlayerIdForSheet = null;

    // ── DOM refs ─────────────────────────────────────────────
    const screens          = Array.from(document.querySelectorAll('.screen'));
    const sortOrderEl      = document.getElementById('sortOrder');
    const playersSettingsEl = document.getElementById('players-settings');
    const playersGameEl    = document.getElementById('players-game');
    const playerNameEl     = document.getElementById('playerName');
    const btnAddPlayer     = document.getElementById('btnAddPlayer');
    const btnDeleteAll     = document.getElementById('btnDeleteAll');
    const btnResetScores   = document.getElementById('btnResetScores');
    const btnUndo          = document.getElementById('btnUndo');
    const stepGroup        = document.getElementById('stepGroup');

    const sheetBackdrop    = document.getElementById('sheetBackdrop');
    const scoreSheet       = document.getElementById('scoreSheet');
    const btnCloseSheet    = document.getElementById('btnCloseSheet');
    const sheetSubtitle    = document.getElementById('sheetSubtitle');
    const customDeltaEl    = document.getElementById('customDelta');
    const btnApplyDelta    = document.getElementById('btnApplyDelta');
    const btnToggleSign    = document.getElementById('btnToggleSign');
    const chipRow          = document.getElementById('chipRow');

    let inputSign = 1;

    btnToggleSign.addEventListener('click', () => {
      inputSign *= -1;
      btnToggleSign.textContent = inputSign === 1 ? '+' : '−';
      btnToggleSign.classList.toggle('sign-neg', inputSign === -1);
    });

    // ── Navigation ───────────────────────────────────────────
    document.body.addEventListener('click', (e) => {
      const nav = e.target.closest('[data-nav]');
      if (nav) { showScreen(nav.getAttribute('data-nav')); return; }
    });

    function showScreen(id) {
      screens.forEach(s => s.classList.remove('active'));
      document.getElementById(id).classList.add('active');
      render();
    }

    // ── Persistence & undo ───────────────────────────────────
    function persist() {
      localStorage.setItem(SESSION_KEY, JSON.stringify(players));
    }

    function pushUndo() {
      undoStack.push(JSON.stringify(players));
      if (undoStack.length > 20) undoStack.shift();
      syncUndoBtn();
    }

    function syncUndoBtn() {
      if (btnUndo) btnUndo.disabled = undoStack.length === 0;
    }

    btnUndo.addEventListener('click', () => {
      if (!undoStack.length) return;
      players = JSON.parse(undoStack.pop());
      persist();
      syncUndoBtn();
      render();
    });

    // ── Player order ─────────────────────────────────────────
    function normalizeOrder() {
      const sorted = [...players].sort((a, b) => a.order - b.order);
      sorted.forEach((p, i) => p.order = i);
      players = sorted;
      persist();
    }

    // ── Add player ───────────────────────────────────────────
    function addPlayer() {
      const name = (playerNameEl.value || '').trim();
      if (!name) return alert('Please enter a name!');
      if (players.some(p => p.name.toLowerCase() === name.toLowerCase()))
        return alert('This player already exists!');

      const maxOrder = players.length ? Math.max(...players.map(p => p.order)) : -1;
      players.push({
        id: crypto?.randomUUID?.() ?? String(Date.now()),
        name,
        score: 0,
        order: maxOrder + 1
      });
      persist();
      playerNameEl.value = '';
      playerNameEl.blur();
      render();
    }

    btnAddPlayer.addEventListener('click', addPlayer);
    playerNameEl.addEventListener('keydown', e => { if (e.key === 'Enter') addPlayer(); });

    // ── Delete all ───────────────────────────────────────────
    btnDeleteAll.addEventListener('click', () => {
      if (!confirm('Are you sure you want to remove all players?')) return;
      players = [];
      undoStack = [];
      syncUndoBtn();
      localStorage.removeItem(SESSION_KEY);
      render();
    });

    // ── Reset scores ─────────────────────────────────────────
    btnResetScores.addEventListener('click', () => {
      if (!players.length) return;
      if (!confirm('Reset all scores to 0?')) return;
      pushUndo();
      players.forEach(p => p.score = 0);
      persist();
      render();
    });

    // ── Sort ─────────────────────────────────────────────────
    sortOrderEl.addEventListener('change', render);

    // ── Step size ────────────────────────────────────────────
    stepGroup.addEventListener('click', (e) => {
      const btn = e.target.closest('.step-btn');
      if (!btn) return;
      stepSize = parseInt(btn.getAttribute('data-step'), 10);
      stepGroup.querySelectorAll('.step-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      render();
    });

    // ── Score actions (event delegation) ─────────────────────
    document.body.addEventListener('click', (e) => {
      const btn = e.target.closest('[data-action]');
      if (!btn) return;
      const action = btn.getAttribute('data-action');
      const id     = btn.getAttribute('data-id');
      if (action === 'inc')    updateScore(id, +stepSize);
      if (action === 'dec')    updateScore(id, -stepSize);
      if (action === 'custom') openSheet(id);
      if (action === 'delete') deletePlayer(id);
      if (action === 'up')     movePlayer(id, -1);
      if (action === 'down')   movePlayer(id, +1);
    });

    function updateScore(id, delta) {
      pushUndo();
      const p = players.find(x => x.id === id);
      if (!p) return;
      p.score += delta;
      if ('vibrate' in navigator) navigator.vibrate(22);
      persist();
      bumpScore(id);
      render();
    }

    function deletePlayer(id) {
      const p = players.find(x => x.id === id);
      if (!p) return;
      if (!confirm(`Remove ${p.name}?`)) return;
      players = players.filter(x => x.id !== id);
      normalizeOrder();
      render();
    }

    function movePlayer(id, dir) {
      const sorted = [...players].sort((a, b) => a.order - b.order);
      const idx = sorted.findIndex(p => p.id === id);
      if (idx < 0) return;
      const newIdx = idx + dir;
      if (newIdx < 0 || newIdx >= sorted.length) return;
      const tmp = sorted[idx].order;
      sorted[idx].order = sorted[newIdx].order;
      sorted[newIdx].order = tmp;
      players = sorted;
      normalizeOrder();
      render();
    }

    // ── Render ───────────────────────────────────────────────
    function getSortedPlayersForGame() {
      const mode = sortOrderEl?.value ?? 'custom';
      const arr = [...players];
      if (mode === 'custom') arr.sort((a, b) => a.order - b.order);
      else if (mode === 'desc') arr.sort((a, b) => b.score - a.score);
      else arr.sort((a, b) => a.score - b.score);
      return arr;
    }

    function renderSettings() {
      if (!playersSettingsEl) return;
      const ordered = [...players].sort((a, b) => a.order - b.order);

      if (!ordered.length) {
        playersSettingsEl.innerHTML = `
          <div class="empty">
            <div class="empty-emoji">👤</div>
            <div><h4>No players yet</h4><p>Add players above.</p></div>
          </div>`;
        return;
      }

      playersSettingsEl.innerHTML = ordered.map((p, i) => `
        <div class="player-row">
          <div class="player-row-main">
            <div class="badge">#${i + 1}</div>
            <div class="player-row-name">${escapeHtml(p.name)}</div>
          </div>
          <div class="player-row-actions">
            <button class="mini" data-action="up"   data-id="${p.id}" aria-label="Move up">↑</button>
            <button class="mini" data-action="down" data-id="${p.id}" aria-label="Move down">↓</button>
            <button class="mini danger" data-action="delete" data-id="${p.id}" aria-label="Delete">🗑</button>
          </div>
        </div>
      `).join('');
    }

    function renderGame() {
      if (!playersGameEl) return;
      const sorted = getSortedPlayersForGame();

      if (!sorted.length) {
        playersGameEl.innerHTML = `
          <div class="empty">
            <div class="empty-emoji">🎮</div>
            <div><h4>No players</h4><p>Go to ⚙ and add players.</p></div>
          </div>`;
        return;
      }

      const showLeader = sorted.length > 1 && sortOrderEl.value !== 'asc';

      playersGameEl.innerHTML = sorted.map((p, index) => {
        const isLeader = showLeader && index === 0;
        return `
          <div class="player-card ${isLeader ? 'leader' : ''}" data-player="${p.id}">
            <div class="player-top">
              <div class="player-name">${isLeader ? '👑 ' : ''}${escapeHtml(p.name)}</div>
              <div class="player-rank">#${index + 1}</div>
            </div>
            <div class="player-score" data-score="${p.id}">${p.score}</div>
            <div class="player-controls">
              <button class="tap minus"  data-action="dec"    data-id="${p.id}" aria-label="Minus ${stepSize}">−${stepSize}</button>
              <button class="tap custom" data-action="custom" data-id="${p.id}" aria-label="Custom value">±</button>
              <button class="tap plus"   data-action="inc"    data-id="${p.id}" aria-label="Plus ${stepSize}">+${stepSize}</button>
            </div>
          </div>`;
      }).join('');
    }

    function render() {
      const active = document.querySelector('.screen.active')?.id;
      if (active === 'settings') renderSettings();
      if (active === 'game')     renderGame();
    }

    // ── Sheet ────────────────────────────────────────────────
    function openSheet(playerId) {
      const p = players.find(x => x.id === playerId);
      if (!p) return;
      activePlayerIdForSheet = playerId;
      sheetSubtitle.textContent = `${p.name} — current score: ${p.score}`;
      customDeltaEl.value = '';
      inputSign = 1;
      btnToggleSign.textContent = '+';
      btnToggleSign.classList.remove('sign-neg');
      sheetBackdrop.classList.remove('hidden');
      scoreSheet.classList.remove('hidden');
      sheetBackdrop.setAttribute('aria-hidden', 'false');
      setTimeout(() => customDeltaEl.focus(), 60);
    }

    function closeSheet() {
      activePlayerIdForSheet = null;
      sheetBackdrop.classList.add('hidden');
      scoreSheet.classList.add('hidden');
      sheetBackdrop.setAttribute('aria-hidden', 'true');
    }

    btnCloseSheet.addEventListener('click', closeSheet);
    sheetBackdrop.addEventListener('click', closeSheet);

    // Chips apply immediately and close sheet
    chipRow.addEventListener('click', (e) => {
      const chip = e.target.closest('.chip');
      if (!chip || !activePlayerIdForSheet) return;
      const delta = parseInt(chip.getAttribute('data-delta'), 10);
      if (Number.isFinite(delta) && delta !== 0) {
        updateScore(activePlayerIdForSheet, delta);
        closeSheet();
      }
    });

    // Custom value
    btnApplyDelta.addEventListener('click', applyCustomDelta);
    customDeltaEl.addEventListener('keydown', e => { if (e.key === 'Enter') applyCustomDelta(); });

    function applyCustomDelta() {
      if (!activePlayerIdForSheet) return;
      const abs = parseInt((customDeltaEl.value || '').trim(), 10);
      if (!Number.isFinite(abs) || abs === 0) {
        alert('Enter a valid value (e.g. 7).');
        return;
      }
      updateScore(activePlayerIdForSheet, Math.abs(abs) * inputSign);
      closeSheet();
    }

    // Swipe down to dismiss sheet
    let swipeStartY = 0;
    scoreSheet.addEventListener('touchstart', e => {
      swipeStartY = e.touches[0].clientY;
    }, { passive: true });
    scoreSheet.addEventListener('touchend', e => {
      if (e.changedTouches[0].clientY - swipeStartY > 80) closeSheet();
    }, { passive: true });

    // ── Animations ───────────────────────────────────────────
    function bumpScore(id) {
      requestAnimationFrame(() => {
        const el = document.querySelector(`[data-player="${cssEscape(id)}"] .player-score`);
        if (!el) return;
        el.classList.remove('bump');
        void el.offsetWidth;
        el.classList.add('bump');
      });
    }

    // ── Helpers ──────────────────────────────────────────────
    function escapeHtml(s) {
      return String(s)
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#039;');
    }

    function cssEscape(s) {
      return String(s).replaceAll('"', '\\"');
    }

    // ── Init ─────────────────────────────────────────────────
    syncUndoBtn();
    render();
  </script>
</body>
</html>
